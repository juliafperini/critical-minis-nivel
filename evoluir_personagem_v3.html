<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evoluir Personagem — Critical Minis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07060A;--bg2:#100D18;--bg3:#1A1528;--bg4:#221C35;--violet:#9B6DFF;--violet2:#BFA0FF;--ember:#5A2E8A;--gold:#C8952A;--gold2:#E8C060;--white:#EAE6FF;--muted:#8A82B5;--dim:#4A4468;--border:rgba(155,109,255,.15);--border2:rgba(155,109,255,.32);--green:#4CAF7D;--green2:#7DFFB3;--red:#FF6B6B;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}html,body{min-height:100vh;background:var(--bg);color:var(--white);font-family:'EB Garamond',serif;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--ember);border-radius:3px}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:float linear infinite;opacity:0}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.6}90%{opacity:.3}100%{transform:translateY(-20px) scale(1.2);opacity:0}}
#app{position:relative;z-index:1;max-width:940px;margin:0 auto;padding:0 20px 80px}
header{display:flex;align-items:center;justify-content:center;flex-direction:column;padding:36px 0 18px;gap:10px}
.logo-wrap{display:flex;align-items:center;gap:14px}
.brand{font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:.18em;color:var(--white);line-height:1}
.brand-sub{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:.45em;color:var(--violet);text-transform:uppercase;margin-top:3px}
.htitle{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,3.5vw,30px);font-weight:900;text-align:center;background:linear-gradient(135deg,var(--gold2),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:6px}
.hsub{font-family:'EB Garamond',serif;font-style:italic;font-size:15px;color:var(--muted);text-align:center}
.prog{padding:18px 0 24px}
.slabels{display:flex;justify-content:space-between;margin-bottom:8px;gap:2px}
.slabel{font-family:'Inter',sans-serif;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);flex:1;text-align:center;transition:color .3s}
.slabel.act{color:var(--violet2)}.slabel.don{color:var(--violet)}
.ptrack{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--ember),var(--violet),var(--gold));border-radius:2px;transition:width .5s}
.sdots{display:flex;justify-content:space-between;margin-top:7px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--bg4);border:1px solid var(--dim);transition:all .3s}
.sdot.act{background:var(--violet);border-color:var(--violet2);box-shadow:0 0 8px var(--violet)}.sdot.don{background:var(--ember);border-color:var(--violet)}
.screen{display:none;animation:fsld .4s ease}.screen.active{display:block}
@keyframes fsld{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.ey{font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:.38em;color:var(--violet);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.ey::before{content:'';display:block;width:24px;height:1px;background:var(--violet)}
.st{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,3.5vw,28px);font-weight:900;color:var(--white);margin-bottom:6px;line-height:1.1}
.sd{font-family:'EB Garamond',serif;font-style:italic;font-size:15px;color:var(--muted);margin-bottom:20px;max-width:640px;line-height:1.6}
.fw{position:relative;margin-bottom:16px}
.fl{position:absolute;top:-10px;left:16px;background:var(--bg);padding:0 6px;font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--violet);text-transform:uppercase;z-index:1}
.fi{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--white);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(155,109,255,.15)}
.fi::placeholder{color:var(--dim);font-weight:400;font-size:13px}
select.fi{cursor:pointer}select.fi option{background:var(--bg2)}
.fi.sm{font-size:14px;padding:11px 15px;font-family:'Inter',sans-serif;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr}.g6{grid-template-columns:repeat(3,1fr)}}
.panel{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:var(--r);padding:20px;margin-bottom:16px}
.ptitle{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold2);letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sbox{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 6px;text-align:center}
.sbox-lbl{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.sbox-val{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--white);line-height:1}
.sbox input{width:100%;background:transparent;border:none;outline:none;font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--white);text-align:center}
.sbox-mod{font-family:'Inter',sans-serif;font-size:11px;color:var(--violet);margin-top:2px}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.cc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 18px rgba(90,46,138,.25)}
.cc.sel{border-color:var(--violet);background:linear-gradient(135deg,var(--bg3),var(--bg4));box-shadow:0 0 16px rgba(155,109,255,.2)}
.cc.sel::after{content:'✦';position:absolute;top:8px;right:10px;color:var(--gold2);font-size:12px}
.cc-icon{font-size:24px;margin-bottom:6px;display:block}
.cc-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:3px}
.cc-tag{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--violet);text-transform:uppercase;margin-bottom:5px}
.cc-desc{font-family:'EB Garamond',serif;font-style:italic;font-size:13px;color:var(--muted);line-height:1.5}
.cc-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.cc-detail.open{display:block}
.cc-detail p{font-family:'EB Garamond',serif;font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:5px}
.cc-detail strong{color:var(--violet2);font-style:normal}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.08em}
.tv{background:rgba(155,109,255,.15);border:1px solid rgba(155,109,255,.3);color:var(--violet2)}
.tg{background:rgba(200,149,42,.12);border:1px solid rgba(200,149,42,.25);color:var(--gold2)}
.tgr{background:rgba(76,175,125,.1);border:1px solid rgba(76,175,125,.25);color:var(--green2)}
.tr{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);color:var(--red)}
.expand-btn{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--violet);text-transform:uppercase;background:none;border:none;cursor:pointer;padding:5px 0;margin-top:5px;display:block}
.cc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:18px}
.dbox{background:linear-gradient(135deg,rgba(90,46,138,.2),rgba(155,109,255,.07));border:1px solid var(--violet);border-radius:var(--r);padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.dicon{font-size:34px;flex-shrink:0}
.dq{flex:1}
.dq p{font-family:'EB Garamond',serif;font-style:italic;font-size:15px;color:var(--muted);margin-bottom:9px;line-height:1.5}
.drow{display:flex;align-items:center;gap:10px}
.di{width:68px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:9px 10px;font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--white);text-align:center;outline:none}
.di:focus{border-color:var(--violet)}
.fc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.fc.new{border-color:var(--gold);background:linear-gradient(135deg,var(--bg3),var(--bg4))}
.fc-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--white);margin-bottom:4px;display:flex;align-items:center;gap:7px}
.badge{background:var(--gold);color:var(--bg);font-family:'Inter',sans-serif;font-size:8px;font-weight:700;letter-spacing:.1em;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.fc-desc{font-family:'EB Garamond',serif;font-style:italic;font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:5px}
.fc-detail{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.fc-detail p{font-family:'EB Garamond',serif;font-size:13px;color:var(--muted);line-height:1.6}
.fc-detail strong{color:var(--violet2);font-style:normal}
.info{background:rgba(155,109,255,.06);border:1px solid rgba(155,109,255,.18);border-radius:var(--r);padding:12px 16px;margin-bottom:12px;font-family:'EB Garamond',serif;font-style:italic;font-size:14px;color:var(--muted);line-height:1.6}
.info strong{color:var(--violet2);font-style:normal}
.info.g{background:rgba(200,149,42,.06);border-color:rgba(200,149,42,.18)}.info.g strong{color:var(--gold2)}
.info.gr{background:rgba(76,175,125,.06);border-color:rgba(76,175,125,.18)}.info.gr strong{color:var(--green2)}
.stbl{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px}
.stbl th{font-family:'Inter',sans-serif;font-size:8px;font-weight:700;letter-spacing:.18em;color:var(--violet);text-transform:uppercase;padding:6px 8px;text-align:center;border-bottom:1px solid var(--border)}
.stbl td{font-family:'Cinzel',serif;font-size:12px;color:var(--white);padding:6px 8px;text-align:center;border-bottom:1px solid rgba(155,109,255,.04)}
.stbl td.hl{color:var(--gold2);font-weight:700}.stbl tr.nr td{background:rgba(200,149,42,.05)}
.spool{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.stag{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:5px 11px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.stag:hover{border-color:var(--border2);color:var(--white)}
.stag.picked{background:rgba(155,109,255,.15);border-color:var(--violet);color:var(--violet2)}
.stag.oath{background:rgba(200,149,42,.1);border-color:rgba(200,149,42,.3);color:var(--gold2);cursor:default}
.stag-wrap{position:relative;display:inline-block}
.stag-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:0;z-index:100;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px 13px;min-width:230px;max-width:300px;font-family:'EB Garamond',serif;font-size:12px;color:var(--muted);line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.stag-tip strong{color:var(--violet2);font-style:normal;display:block;margin-bottom:4px;font-family:'Cinzel',serif;font-size:12px}
.stag-wrap:hover .stag-tip{display:block}
.navb{display:flex;gap:12px;justify-content:flex-end;margin-top:18px}
.btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:13px 26px;cursor:pointer;border:none;outline:none;transition:all .18s;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%)}
.btn-p{background:linear-gradient(135deg,var(--ember),var(--violet));color:#fff;border:1px solid var(--violet)}
.btn-p:hover{background:linear-gradient(135deg,#7B4FC9,var(--violet2));box-shadow:0 0 18px rgba(155,109,255,.6)}
.btn-s{background:transparent;border:1px solid rgba(155,109,255,.3);color:var(--muted)}
.btn-s:hover{border-color:var(--violet);color:var(--white)}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg)}
.btn-g:hover{box-shadow:0 0 18px rgba(200,149,42,.6)}
.orn{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--dim);font-size:12px}
.orn::before,.orn::after{content:'';flex:1;height:1px;background:var(--border)}
.sheet{background:linear-gradient(160deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:12px;padding:26px;margin-bottom:18px}
.shead{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.cname{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,4vw,32px);font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px}
.cid{font-family:'Cinzel',serif;font-size:13px;color:var(--muted);letter-spacing:.08em}
.lvlbadge{display:inline-block;background:linear-gradient(135deg,var(--ember),var(--violet));padding:5px 18px;border-radius:20px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#fff;margin-top:7px}
.lubanner{background:linear-gradient(135deg,rgba(200,149,42,.18),rgba(232,192,96,.07));border:1px solid var(--gold);border-radius:12px;padding:20px;text-align:center;margin-bottom:18px;animation:glow 2s ease infinite}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(200,149,42,.15)}50%{box-shadow:0 0 36px rgba(200,149,42,.4)}}
.lubanner h2{font-family:'Cinzel Decorative',serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.lubanner p{font-family:'EB Garamond',serif;font-style:italic;font-size:15px;color:var(--muted)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,var(--ember),var(--violet));color:#fff;padding:11px 22px;border-radius:40px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:1000;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hp-track{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-top:14px}
.hp-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:4px}
.hp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),#FF9E9E)}
</style>
</head>

<div id="particles"></div>
<div class="toast" id="toast"></div>
<div id="app">

let S={name:'',level:0,cls:'',race:'',subrace:'',background:'',subclass:'',stats:{str:10,dex:10,con:10,int:10,wis:10,cha:10},hp:0,prof:2,newHP:0,hpGained:0,asiChoice:'',asiStat1:'',asiStat2:'',useFeat:false,featChoice:'',fightingStyle:'',subclassChoice:'',oathType:'',newSpells:[],newCantrips:[],replaceSpell:'',invocations:[],metamagic:[],pactChoice:'',newLevel:0,steps:[],curStep:0,prepSpells:0};
function getMod(v){return Math.floor(((parseInt(v)||10)-10)/2);}
function modS(v){const m=getMod(v);return(m>=0?'+':'')+m;}
function isFC(c){return['bardo','clerigo','druida','feiticeiro','mago'].includes(c);}
function isHC(c){return['paladino','patrulheiro'].includes(c);}
function isWL(c){return c==='bruxo';}
function isKnown(c){return['bardo','feiticeiro','bruxo','patrulheiro'].includes(c);}
function isPrep(c){return['clerigo','druida','mago','paladino'].includes(c);}
function getSlots(c,l){if(isFC(c))return FULL_SLOTS[l]||[];if(isHC(c))return HALF_SLOTS[l]||[];return null;}
function calcPrep(c,l,st){if(!isPrep(c))return 0;const k=c==='mago'?'int':c==='paladino'?'cha':'wis';return Math.max(1,c==='paladino'?Math.floor(l/2)+getMod(st[k]):l+getMod(st[k]));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function toggleDetail(btn){const d=btn.nextElementSibling;const o=d.classList.toggle('open');btn.textContent=o?'▲ Fechar detalhes':'▼ Ver detalhes completos';}

function buildSteps(){
  const steps=['personagem','pv'];
  const l=S.newLevel,c=S.cls;
  if((ASI[c]||[]).includes(l))steps.push('asi');
  if((c==='paladino'||c==='guerreiro'||c==='patrulheiro')&&l===2)steps.push('estilo');
  if(SL_LVL[c]===l&&!S.subclass)steps.push('subclasse');
  if(c==='paladino'&&l===3)steps.push('juramento');
  if(c==='bruxo'&&l===3)steps.push('pacto');
  if(c==='bruxo'&&[2,5,7,9,12,15,18].includes(l))steps.push('invocacoes');
  if(c==='feiticeiro'&&[3,10,17].includes(l))steps.push('metamagia');
  if(['bardo','clerigo','druida','feiticeiro','mago','bruxo','paladino','patrulheiro','monge'].includes(c)&&l>=(isHC(c)?2:1))steps.push('magias');
  steps.push('habilidades');
  steps.push('resumo');
  S.steps=steps;
}

const SNAMES={personagem:'Personagem',pv:'PV',asi:'Atributos',estilo:'Estilo',subclasse:'Subclasse',juramento:'Juramento',pacto:'Pacto',invocacoes:'Invocações',metamagia:'Metamagia',magias:'Magias',habilidades:'Habilidades',resumo:'Resumo'};
function updateProg(){
  const tot=S.steps.length,cur=S.curStep;
  document.getElementById('pfill').style.width=`${(cur/Math.max(1,tot-1))*100}%`;
  document.getElementById('slabels').innerHTML=S.steps.map((s,i)=>`<div class="slabel ${i===cur?'act':i<cur?'don':''}">${SNAMES[s]||s}</div>`).join('');
  document.getElementById('sdots').innerHTML=S.steps.map((s,i)=>`<div class="sdot ${i===cur?'act':i<cur?'don':''}"></div>`).join('');
}

function render(){
  const sw=document.getElementById('sw');
  const step=S.steps[S.curStep];
  const back=S.curStep>0?`<button class="btn btn-s" onclick="nav(-1)">← Voltar</button>`:'';
  const next=step!=='resumo'?`<button class="btn btn-p" onclick="nav(1)">Avançar →</button>`:'';
  sw.innerHTML=`<div class="screen active" id="cs">${renderStep(step)}<div class="navb">${back}${next}</div></div>`;
  updateProg();
  window.scrollTo({top:0,behavior:'smooth'});
}

function nav(d){
  const step=S.steps[S.curStep];
  if(d===1&&!validate(step))return;
  if(d===1){commit(step);if(step==='personagem'){S.curStep=1;render();return;}}
  S.curStep+=d;
  if(S.curStep>=S.steps.length){finalize();return;}
  render();
}

function validate(step){
  if(step==='personagem'){
    const n=(document.getElementById('c-name')?.value||'').trim();
    const l=document.getElementById('c-level')?.value;
    const c=document.getElementById('c-class')?.value;
    const r=document.getElementById('c-race')?.value;
    const h=document.getElementById('c-hp')?.value;
    const p=document.getElementById('c-prof')?.value;
    if(!n||!l||!c||!r||!h||!p){showToast('Preencha todos os campos!');return false;}
    return true;
  }
  if(step==='pv'){if(S.newHP<=0){showToast('Role ou escolha a média de PV!');return false;}return true;}
  if(step==='asi'){
    if(S.useFeat){if(!S.featChoice){showToast('Escolha um talento!');return false;}return true;}
    if(S.asiChoice==='plus2'){if(!S.asiStat1){showToast('Escolha o atributo para +2!');return false;}return true;}
    if(S.asiChoice==='plus1x2'){if(!S.asiStat1||!S.asiStat2){showToast('Escolha dois atributos!');return false;}return true;}
    showToast('Escolha como distribuir a melhoria!');return false;
  }
  if(step==='estilo'){if(!S.fightingStyle){showToast('Escolha um estilo de combate!');return false;}return true;}
  if(step==='subclasse'){if(!S.subclassChoice){showToast('Escolha sua subclasse!');return false;}return true;}
  if(step==='juramento'){if(!S.oathType){showToast('Escolha seu juramento!');return false;}return true;}
  if(step==='pacto'){if(!S.pactChoice){showToast('Escolha seu pacto!');return false;}return true;}
  if(step==='invocacoes'){const req=reqInv();if(S.invocations.length<req){showToast(`Escolha ${req} invocação(ões)!`);return false;}return true;}
  if(step==='metamagia'){if(S.metamagic.length<2){showToast('Escolha 2 opções de Metamagia!');return false;}return true;}
  return true;
}

function commit(step){
  if(step==='personagem'){
    S.name=(document.getElementById('c-name').value||'').trim();
    S.level=parseInt(document.getElementById('c-level').value);
    S.cls=document.getElementById('c-class').value;
    S.race=document.getElementById('c-race').value;
    S.hp=parseInt(document.getElementById('c-hp').value);
    S.prof=parseInt(document.getElementById('c-prof').value);
    S.subrace=document.getElementById('c-subrace')?.value||'';
    S.background=document.getElementById('c-background')?.value||'';
    S.subclass=document.getElementById('c-subclass')?.value||'';
    SK.forEach(k=>{S.stats[k]=parseInt(document.getElementById('s-'+k)?.value)||10;});
    S.newLevel=S.level+1;
    buildSteps();
  }
}

  return R[step]?R[step]():`<p>Passo: ${step}</p>`;
}

  const c=S.cls,l=S.newLevel,ol=S.level;let html='';
  if(isFC(c)||isHC(c)){
    const ns=getSlots(c,l)||[],os=getSlots(c,ol)||[];

  if(['clerigo','druida','mago'].includes(c)){

      <div class="info g">Você pode ter <strong>${np} magias preparadas</strong>${c==='mago'?` = mod INT (${modS(S.stats.int)}) + nível (${l})`:` = mod SAB (${modS(S.stats.wis)}) + nível (${l})`}.${np>op?` <strong>+${np-op}</strong> a mais que antes.`:''}</div>
      ${c==='mago'?`<div class="info gr"><strong>Mago:</strong> Ao subir de nível, você adiciona <strong>2 magias</strong> ao Livro de Feitiços (qualquer nível disponível):<br><input class="fi sm" style="margin-top:8px" placeholder="Nova magia 1" value="${S.newSpells[0]||''}" oninput="S.newSpells[0]=this.value"><input class="fi sm" style="margin-top:8px" placeholder="Nova magia 2" value="${S.newSpells[1]||''}" oninput="S.newSpells[1]=this.value"></div>`:''}

      <div class="info">Total de magias conhecidas no nível ${l}: <strong>${nk}</strong>${gain>0?` (+${gain} nova${gain>1?'s':''} magia${gain>1?'s':''})`:''}.</div>
      ${gain>0?`<div class="info gr">Aprenda <strong>${gain}</strong> nova${gain>1?'s':''} magia${gain>1?'s':''}! Consulte a lista da sua classe e anote:<br>${[...Array(gain)].map((_,i)=>`<input class="fi sm" style="margin-top:8px" placeholder="Nova magia ${i+1}" value="${S.newSpells[i]||''}" oninput="S.newSpells[${i}]=this.value">`).join('')}</div>

function togSp(n,max){
  if(S.newSpells.includes(n))S.newSpells=S.newSpells.filter(x=>x!==n);
  else if(S.newSpells.length<max)S.newSpells.push(n);
  else{showToast(`Máximo ${max} magias preparadas!`);return;}
  document.querySelectorAll('#cs .stag:not(.oath)').forEach(el=>el.classList.toggle('picked',S.newSpells.includes(el.textContent.trim())));
  const c=document.getElementById('sp-c');if(c)c.textContent=`Marcadas: ${S.newSpells.length} de ${max}`;
}

function getFeats(){
  const data=FEATURES[S.cls]||{},res=[],seen=new Set();
  Object.entries(data).forEach(([k,arr])=>{if(parseInt(k)===S.newLevel)(Array.isArray(arr)?arr:[arr]).forEach(f=>{if(!seen.has(f.n)){seen.add(f.n);res.push(f);}});});
  return res;
}
function getOathSp(){
  if(!S.oathType)return[];
  const o=Object.values(OATHS).find(o=>o.n===S.oathType);
  return o?(o.spells[S.newLevel]||[]):[];
}

function rHabs(){
  const feats=getFeats(),pnew=PB[S.newLevel],pch=pnew!==S.prof;

  return`<div class="ey">Novas Habilidades</div><div class="st">O que você ganha no Nível ${S.newLevel}</div><div class="sd">Todas as habilidades e poderes ao atingir este nível.</div>
  ${pch?`<div class="fc new"><div class="fc-name">🛡 Bônus de Proficiência <span class="badge">Novo</span></div><div class="fc-desc">Aumenta de <strong>+${S.prof}</strong> para <strong style="color:var(--gold2)">+${pnew}</strong>.</div><div class="fc-detail"><p>O Bônus de Proficiência afeta: ataques com armas/magias com proficiência, testes de resistência com proficiência, e todas as perícias com proficiência. O aumento é automático.</p></div></div>`:''}
  ${feats.map(f=>`<div class="fc new"><div class="fc-name">${f.icon||'⚔'} ${f.n} <span class="badge">Novo</span></div><div class="fc-desc">${f.desc}</div>${f.detail?`<div class="fc-detail"><p>${f.detail}</p></div>`:''}</div>`).join('')}

function finalize(){
  const pnew=PB[S.newLevel];
  if(!S.useFeat&&S.asiChoice==='plus2'&&S.asiStat1)S.stats[S.asiStat1]=Math.min(20,S.stats[S.asiStat1]+2);
  else if(!S.useFeat&&S.asiChoice==='plus1x2'&&S.asiStat1&&S.asiStat2){S.stats[S.asiStat1]=Math.min(20,S.stats[S.asiStat1]+1);S.stats[S.asiStat2]=Math.min(20,S.stats[S.asiStat2]+1);}
  if(S.subclassChoice)S.subclass=S.subclassChoice;
  S.hp=S.newHP;S.prof=pnew;S.level=S.newLevel;
  S.steps=[...S.steps,'resumo'].filter((v,i,a)=>a.indexOf(v)===i);
  S.curStep=S.steps.indexOf('resumo');
  render();
}
function levelAgain(){
  if(S.level>=20){showToast('Nível 20 atingido!');return;}
  S.newLevel=S.level+1;S.newHP=0;S.hpGained=0;
  S.asiChoice='';S.asiStat1='';S.asiStat2='';S.useFeat=false;S.featChoice='';
  S.fightingStyle='';S.subclassChoice='';S.oathType='';
  S.newSpells=[];S.newCantrips=[];S.replaceSpell='';
  S.invocations=[];S.metamagic=[];S.pactChoice='';
  buildSteps();S.curStep=1;render();
}

}

function getSubraceOpts(race) {
  const subs = SUBRACES[race] || [];
  if (!subs.length) return '<option value="">Esta raça não possui sub-raça</option>';
  return '<option value="">Selecione a sub-raça</option>' +
    subs.map(s => `<option value="${s.n}">${s.n}</option>`).join('');
}


function buildSubraceSelect(race, selectedVal) {
  const subs = SUBRACES[race] || [];
  if (!subs.length) return '<option value="">Esta raça não possui sub-raça</option>';
  let opts = '<option value="">Selecione a sub-raça</option>';
  subs.forEach(s => {
    opts += `<option value="${s.n}"${selectedVal===s.n?' selected':''}>${s.n}</option>`;
  });
  return opts;
}


function updBackground() {
  const el = document.getElementById('c-background');
  const descEl = document.getElementById('bg-desc');
  if (!el || !descEl) return;
  const key = el.value;
  const bg = BACKGROUNDS[key];
  if (bg) {
    descEl.style.display = 'block';
    const extras = [
      bg.pericias   ? `<strong>Perícias:</strong> ${bg.pericias}` : '',
      bg.idiomas    ? `<strong>Idiomas:</strong> ${bg.idiomas}` : '',
      bg.ferramentas? `<strong>Ferramentas:</strong> ${bg.ferramentas}` : '',
      bg.equip      ? `<strong>Equipamento:</strong> ${bg.equip}` : '',
      bg.feature    ? `<strong>Característica:</strong> ${bg.feature}` : '',
    ].filter(Boolean).join('<br>');
    descEl.innerHTML = `<div class="info g"><strong>${bg.icon} ${key.replace(/_/g,' ')}</strong><br>${bg.desc}<br><br>${extras}<div class="tag-row">${bg.tags.map(t=>'<span class="tag tg">'+t+'</span>').join('')}</div></div>`;
  } else {
    descEl.style.display = 'none';
  }
}

function updSubraceSelect(race) {
  const subraceEl = document.getElementById('c-subrace');
  const descEl = document.getElementById('subrace-desc');
  if (!subraceEl) return;
  subraceEl.innerHTML = buildSubraceSelect(race, '');
  if (descEl) descEl.style.display = 'none';
}
function updSubrace() {
  const raceEl = document.getElementById('c-race');
  const subraceEl = document.getElementById('c-subrace');
  const descEl = document.getElementById('subrace-desc');
  if (!subraceEl || !descEl) return;
  const race = raceEl?.value || S.race;
  const val = subraceEl.value;
  const subs = SUBRACES[race] || [];
  const found = subs.find(s => s.n === val);
  if (found) {
    descEl.style.display = 'block';
    descEl.innerHTML = `<div class="info gr"><strong>${found.n}:</strong> ${found.desc}</div>`;
  } else {
    descEl.style.display = 'none';
  }
}

function initParticles(){
  const ct=document.getElementById('particles');
  ['#9B6DFF','#C8952A','#5A2E8A','#BFA0FF','#E8C060'].forEach(col=>{
    for(let i=0;i<6;i++){const p=document.createElement('div');p.className='particle';const sz=Math.random()*4+2;p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:${col};animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*8}s;`;ct.appendChild(p);}
  });
}
window.addEventListener('DOMContentLoaded',()=>{
  initParticles();
  S.steps=['personagem','pv','habilidades','resumo'];
  render();
});
